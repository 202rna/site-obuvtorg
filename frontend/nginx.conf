server {
    listen 80;
    server_name xn----9sbdf5cdoog5g.xn--p1ai www.xn----9sbdf5cdoog5g.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name xn----9sbdf5cdoog5g.xn--p1ai www.xn----9sbdf5cdoog5g.xn--p1ai;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/xn----9sbdf5cdoog5g.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn----9sbdf5cdoog5g.xn--p1ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
